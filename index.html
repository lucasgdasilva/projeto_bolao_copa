<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Bolão da Copa</title>
</head>
<body>
  <h2>Login</h2>
  <input type="text" id="nome" placeholder="Digite seu nome">
  <button onclick="entrar()">Entrar</button>

  <script>
    function entrar() {
      const nome = document.getElementById("nome").value;
      if (!nome) return alert("Digite seu nome!");

      // envia para Google Sheets via Apps Script
      fetch("https://script.google.com/macros/s/AKfycbwyZWm4-ZVpAorMbHWYLp6pZD-PWZsOenwxS_8BlKN0u-BkUBhF76wJv8CE0X6E8S2g/exec?nome=" + encodeURIComponent(nome))
        .then(res => res.text())
        .then(msg => {
          alert(msg);
          // aqui você pode redirecionar para a tela de jogos
          window.location.href = "jogos.html";
        });
    }
  </script>
</body>
</html>
